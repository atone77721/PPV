name: PPV Stream Fetcher

on:
  schedule:
    - cron: '0 * * * *'   # hourly, UTC
  workflow_dispatch:

# 🔑 Make the token able to push
permissions:
  contents: write

jobs:
  fetch-streams:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        persist-credentials: true   # ensure push uses GITHUB_TOKEN
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install aiohttp playwright
        playwright install
        playwright install-deps

    - name: Run PPV script
      run: python ppv.py

    # 🧪 Optional: show what's changed (great for debugging)
    - name: Show status & diff
      run: |
        git status
        git diff -- PPVLand.m3u8 || true

    - name: Commit changes
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Ensure the file isn't ignored and is staged if changed
        if [ -f ".gitignore" ] && grep -E '(^|\s)\*.m3u8(\s|$)' .gitignore; then
          echo "::warning ::.gitignore excludes *.m3u8. Remove that rule or add an exception for PPVLand.m3u8."
        fi

        git config --local user.name  "github-actions[bot]"
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"

        git add PPVLand.m3u8

        # Only commit if there's something staged
        if ! git diff --staged --quiet; then
          git commit -m "Update PPV streams [skip ci]"
          git push
        else
          echo "No changes to commit"
        fi

    # 📦 Optional: upload the generated file as an artifact every run
    - name: Upload playlist artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: PPVLand.m3u8
        path: PPVLand.m3u8
